  <text x="40.0" y="482.8" font-size="11" fill="#333" text-anchor="start" font-weight="normal">1. Import 1_top_view.dxf → Insert > Insert DXF (select XY plane)</text>
  <text x="40.0" y="504.8" font-size="11" fill="#333" text-anchor="start" font-weight="normal">2. Extrude profile upward: Z = 340mm (New Body)</text>
  <text x="40.0" y="526.8" font-size="11" fill="#333" text-anchor="start" font-weight="normal">3. Shell command: wall thickness = 5mm, select top face to hollow</text>
  <text x="40.0" y="548.8" font-size="11" fill="#333" text-anchor="start" font-weight="normal">4. Shell 1 sits at Z = 0 (no translation needed)</text>
  <text x="40.0" y="570.8" font-size="11" fill="#333" text-anchor="start" font-weight="normal">5. Cut conduit holes (Extrude > Cut) per 4_lead_exit_view.dxf</text>
  <text x="40.0" y="592.8" font-size="11" fill="#333" text-anchor="start" font-weight="normal">6. Add foam-pressure ribs on inner face: 3mm x 10mm, 100mm spacing</text>
  <text x="40.0" y="614.8" font-size="11" fill="#333" text-anchor="start" font-weight="normal">7. Add spacer nubs between ribs: 30mm inward (full foam gap), corners + mid-walls</text>
  <text x="40.0" y="636.8" font-size="11" fill="#333" text-anchor="start" font-weight="normal">8. Add conduit sleeves: 5mm-wall tubes around conduit holes, 30mm inward</text>
  <text x="40.0" y="658.8" font-size="11" fill="#333" text-anchor="start" font-weight="normal">9. Verify outer dims: 343 x 239 x 340mm</text>
