<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="750" viewBox="0 0 1100 750">
  <style>text { font-family: Arial, Helvetica, sans-serif; }</style>
  <rect width="1100" height="750" fill="white"/>
  <text x="20.0" y="30.0" font-size="18" fill="#333" text-anchor="start" font-weight="bold">SATELLITE UNIT — LID EXTRUSION (Rev 3.2)</text>
  <text x="20.0" y="50.0" font-size="11" fill="#555" text-anchor="start" font-weight="normal">Lid: 373 x 269mm  |  Body: 25mm (20% infill = insulation)  |  Skirt: 20mm  |  Overhang: 15mm past cap rim</text>
  <text x="260.0" y="115.0" font-size="13" fill="#333" text-anchor="middle" font-weight="bold">PLAN VIEW (lid outline + cap rim ref)</text>
  <rect x="60.0" y="130.0" width="400.0" height="288.5" fill="#f8f0fc" stroke="#be4bdb" stroke-width="2.5" opacity="1.0" rx="0"/>
  <rect x="76.1" y="146.1" width="367.8" height="256.3" fill="none" stroke="#ff922b" stroke-width="1.5" opacity="1.0" rx="0"/>
  <rect x="76.1" y="146.1" width="367.8" height="256.3" fill="none" stroke="#ff9a3c" stroke-width="1" opacity="1.0" rx="0"/>
  <text x="260.0" y="127.0" font-size="10" fill="#862e9c" text-anchor="middle" font-weight="bold">Lid: 373 x 269mm</text>
  <text x="260.0" y="278.2" font-size="9" fill="#d9480f" text-anchor="middle" font-weight="normal">Cap rim: 343 x 239mm</text>
  <line x1="60.0" y1="433.5" x2="60.0" y2="443.5" stroke="#862e9c" stroke-width="1"/>
  <line x1="76.1" y1="433.5" x2="76.1" y2="443.5" stroke="#862e9c" stroke-width="1"/>
  <line x1="60.0" y1="438.5" x2="76.1" y2="438.5" stroke="#862e9c" stroke-width="1"/>
  <text x="68.0" y="434.5" font-size="10" fill="#862e9c" text-anchor="middle" font-weight="normal">15mm overhang</text>
  <line x1="60.0" y1="463.5" x2="60.0" y2="473.5" stroke="#862e9c" stroke-width="1"/>
  <line x1="460.0" y1="463.5" x2="460.0" y2="473.5" stroke="#862e9c" stroke-width="1"/>
  <line x1="60.0" y1="468.5" x2="460.0" y2="468.5" stroke="#862e9c" stroke-width="1"/>
  <text x="260.0" y="464.5" font-size="10" fill="#862e9c" text-anchor="middle" font-weight="normal">373mm</text>
  <line x1="470.0" y1="130.0" x2="480.0" y2="130.0" stroke="#862e9c" stroke-width="1"/>
  <line x1="470.0" y1="418.5" x2="480.0" y2="418.5" stroke="#862e9c" stroke-width="1"/>
  <line x1="475.0" y1="130.0" x2="475.0" y2="418.5" stroke="#862e9c" stroke-width="1"/>
  <text x="481.0" y="278.2" font-size="10" fill="#862e9c" text-anchor="start" font-weight="normal">269mm</text>
  <text x="260.0" y="498.5" font-size="10" fill="#555" text-anchor="middle" font-weight="normal">Source: 9_lid_top_view.dxf + 8_cap_profile.dxf</text>
  <text x="770.0" y="150.0" font-size="13" fill="#333" text-anchor="middle" font-weight="bold">SIDE PROFILE (body + skirt)</text>
  <rect x="620.0" y="180.0" width="300.0" height="20.1" fill="#f8f0fc" stroke="#be4bdb" stroke-width="2.5" opacity="1.0" rx="0"/>
  <rect x="620.0" y="200.1" width="8.0" height="16.1" fill="#f8f0fc" stroke="#be4bdb" stroke-width="2" opacity="1.0" rx="0"/>
  <rect x="912.0" y="200.1" width="8.0" height="16.1" fill="#f8f0fc" stroke="#be4bdb" stroke-width="2" opacity="1.0" rx="0"/>
  <rect x="632.1" y="200.1" width="275.9" height="6.4" fill="none" stroke="#ff922b" stroke-width="1.5" opacity="1.0" rx="0"/>
  <text x="770.0" y="221.5" font-size="9" fill="#d9480f" text-anchor="middle" font-weight="normal">Cap rim (below lid)</text>
  <line x1="930.0" y1="180.0" x2="940.0" y2="180.0" stroke="#862e9c" stroke-width="1"/>
  <line x1="930.0" y1="200.1" x2="940.0" y2="200.1" stroke="#862e9c" stroke-width="1"/>
  <line x1="935.0" y1="180.0" x2="935.0" y2="200.1" stroke="#862e9c" stroke-width="1"/>
  <text x="941.0" y="194.1" font-size="10" fill="#862e9c" text-anchor="start" font-weight="normal">Body 25mm</text>
  <line x1="930.0" y1="200.1" x2="940.0" y2="200.1" stroke="#862e9c" stroke-width="1"/>
  <line x1="930.0" y1="216.2" x2="940.0" y2="216.2" stroke="#862e9c" stroke-width="1"/>
  <line x1="935.0" y1="200.1" x2="935.0" y2="216.2" stroke="#862e9c" stroke-width="1"/>
  <text x="941.0" y="212.2" font-size="10" fill="#862e9c" text-anchor="start" font-weight="normal">Skirt 20mm</text>
  <text x="770.0" y="256.2" font-size="10" fill="#862e9c" text-anchor="middle" font-weight="normal">373mm</text>
  <rect x="15.0" y="510.0" width="1070.0" height="200.0" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1" opacity="1.0" rx="4"/>
  <text x="30.0" y="530.0" font-size="14" fill="#333" text-anchor="start" font-weight="bold">FUSION 360 WORKFLOW</text>
  <text x="40.0" y="555.0" font-size="11" fill="#333" text-anchor="start" font-weight="normal">1. Import 9_lid_top_view.dxf → Insert > Insert DXF (select XY plane at Z = top of cap rim)</text>
  <text x="40.0" y="577.0" font-size="11" fill="#333" text-anchor="start" font-weight="normal">2. Extrude lid body: select outer rectangle, Extrude Z = 25mm upward (New Body)</text>
  <text x="40.0" y="599.0" font-size="11" fill="#333" text-anchor="start" font-weight="normal">3. Extrude rain skirt: select perimeter ring, Extrude Z = 20mm downward (Join)</text>
  <text x="40.0" y="621.0" font-size="11" fill="#333" text-anchor="start" font-weight="normal">4. Cut drip edge groove on skirt underside: 3mm inset, 3mm deep, 2mm wide channel (Extrude > Cut)</text>
  <text x="40.0" y="643.0" font-size="11" fill="#333" text-anchor="start" font-weight="normal">5. Cut M4 bolt through-holes from 9_lid_top_view.dxf (Extrude > Cut > All) — threads into 6mm inserts in cap</text>
  <text x="40.0" y="665.0" font-size="11" fill="#333" text-anchor="start" font-weight="normal">6. Chamfer top edges: Modify > Chamfer 3mm on all top perimeter edges</text>
  <text x="40.0" y="687.0" font-size="11" fill="#333" text-anchor="start" font-weight="normal">7. Verify: 373 x 269mm, body 25mm, skirt 20mm, overhang 15mm</text>
  <text x="40.0" y="709.0" font-size="11" fill="#333" text-anchor="start" font-weight="normal">8. Print: ASA, 20% infill (trapped air = insulation), no foam behind lid</text>
</svg>
