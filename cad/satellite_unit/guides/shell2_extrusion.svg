  <text x="40.0" y="509.7" font-size="11" fill="#333" text-anchor="start" font-weight="normal">1. Import 1_top_view.dxf → Insert > Insert DXF (select XY plane)</text>
  <text x="40.0" y="531.7" font-size="11" fill="#333" text-anchor="start" font-weight="normal">2. Extrude profile upward: Z = 300mm (New Body)</text>
