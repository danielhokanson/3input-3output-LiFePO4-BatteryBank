  <text x="600" y="100" font-size="14" fill="#cc3333" text-anchor="start" font-weight="bold">FUSION 360 WORKFLOW</text>
  <text x="600" y="130" font-size="11" fill="#333" text-anchor="start" font-weight="bold">1. Insert DXF &gt; select 1_top_view.dxf</text>
  <text x="600" y="152" font-size="11" fill="#333" text-anchor="start" font-weight="normal">   (File &gt; Insert &gt; Insert DXF, place at origin)</text>
  <text x="600" y="174" font-size="11" fill="#999" text-anchor="start" font-weight="normal"></text>
  <text x="600" y="196" font-size="11" fill="#333" text-anchor="start" font-weight="bold">2. Extrude the profile upward</text>
  <text x="600" y="218" font-size="11" fill="#333" text-anchor="start" font-weight="normal">   Select closed profile &gt; Extrude &gt; Distance = 362mm</text>
  <text x="600" y="240" font-size="11" fill="#333" text-anchor="start" font-weight="normal">   Direction: One Side (positive Z)</text>
  <text x="600" y="262" font-size="11" fill="#999" text-anchor="start" font-weight="normal"></text>
  <text x="600" y="284" font-size="11" fill="#333" text-anchor="start" font-weight="bold">3. Shell command: 5mm wall</text>
  <text x="600" y="306" font-size="11" fill="#333" text-anchor="start" font-weight="normal">   Modify &gt; Shell &gt; select top face</text>
  <text x="600" y="328" font-size="11" fill="#333" text-anchor="start" font-weight="normal">   Inside thickness = 5mm</text>
  <text x="600" y="350" font-size="11" fill="#999" text-anchor="start" font-weight="normal"></text>
  <text x="600" y="372" font-size="11" fill="#333" text-anchor="start" font-weight="bold">4. Position the body at Z-offset</text>
  <text x="600" y="394" font-size="11" fill="#333" text-anchor="start" font-weight="normal">   Move/Copy &gt; Z translation = 0mm</text>
  <text x="600" y="416" font-size="11" fill="#333" text-anchor="start" font-weight="normal">   (aligns shell base to correct height in assembly)</text>
  <text x="600" y="438" font-size="11" fill="#999" text-anchor="start" font-weight="normal"></text>
  <text x="600" y="460" font-size="11" fill="#333" text-anchor="start" font-weight="bold">5. Cut conduit holes (Extrude &gt; Cut)</text>
  <text x="600" y="482" font-size="11" fill="#333" text-anchor="start" font-weight="normal">   Positions per 4_rear_view.dxf</text>
  <text x="600" y="504" font-size="11" fill="#999" text-anchor="start" font-weight="normal"></text>
  <text x="600" y="526" font-size="11" fill="#333" text-anchor="start" font-weight="bold">6. Add foam-pressure ribs on inner face</text>
  <text x="600" y="548" font-size="11" fill="#333" text-anchor="start" font-weight="normal">   3mm wide × 10mm protrusion, spaced 100mm vertically</text>
  <text x="600" y="570" font-size="11" fill="#333" text-anchor="start" font-weight="normal">   Extrude inward from inner surface (Join)</text>
  <text x="600" y="592" font-size="11" fill="#999" text-anchor="start" font-weight="normal"></text>
  <text x="600" y="614" font-size="11" fill="#333" text-anchor="start" font-weight="bold">7. Add spacer nubs between ribs (inner face → inward 30mm)</text>
  <text x="600" y="636" font-size="11" fill="#333" text-anchor="start" font-weight="normal">   Sketch pads on inner surface at corner + mid-wall positions</text>
  <text x="600" y="658" font-size="11" fill="#333" text-anchor="start" font-weight="normal">   Extrude 30mm inward (Join) — full foam gap depth</text>
  <text x="600" y="680" font-size="11" fill="#333" text-anchor="start" font-weight="normal">   Nubs fit between rib rows, 2 vertical levels</text>
  <text x="600" y="702" font-size="11" fill="#999" text-anchor="start" font-weight="normal"></text>
  <text x="600" y="724" font-size="11" fill="#333" text-anchor="start" font-weight="bold">8. Add conduit sleeves (5mm-wall tubes, 30mm long)</text>
  <text x="600" y="746" font-size="11" fill="#333" text-anchor="start" font-weight="normal">   Sketch annular ring around each conduit hole on inner face</text>
  <text x="600" y="768" font-size="11" fill="#333" text-anchor="start" font-weight="normal">   Extrude 30mm inward (Join) — keeps foam out of conduits</text>
  <text x="600" y="790" font-size="11" fill="#999" text-anchor="start" font-weight="normal"></text>
  <text x="600" y="812" font-size="11" fill="#333" text-anchor="start" font-weight="bold">9. Verify dimensions</text>
  <text x="600" y="834" font-size="11" fill="#333" text-anchor="start" font-weight="normal">   Outer: 598 x 368 x 362mm</text>
  <text x="600" y="856" font-size="11" fill="#333" text-anchor="start" font-weight="normal">   Wall thickness: 5mm</text>
  <text x="600" y="878" font-size="11" fill="#333" text-anchor="start" font-weight="normal">   Shell base at Z = 0mm</text>
  <rect x="580" y="695" width="490" height="30" fill="#ff6b6b" stroke="#cc3333" stroke-width="1" opacity="1.0" rx="4"/>
  <text x="825" y="715" font-size="12" fill="white" text-anchor="middle" font-weight="bold">Material: ASA  |  Wall: 5mm</text>
