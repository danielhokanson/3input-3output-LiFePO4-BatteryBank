<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="750" viewBox="0 0 1100 750">
  <style>text { font-family: Arial, Helvetica, sans-serif; }</style>
  <rect width="1100" height="750" fill="white"/>
  <text x="20" y="30" font-size="18" fill="#333" text-anchor="start" font-weight="bold">LID — EXTRUSION GUIDE (Rev 3.2)</text>
  <text x="20" y="50" font-size="12" fill="#555" text-anchor="start" font-weight="normal">Outer: 628 x 398mm  |  Body: 25mm (20% infill = insulation)  |  Skirt: 20mm  |  Overhang: 15mm</text>
  <text x="20" y="90" font-size="13" fill="#333" text-anchor="start" font-weight="bold">PLAN VIEW (lid outline, bolt holes, cap rim reference)</text>
  <rect x="82.76381909547737" y="114.99999999999999" width="394.47236180904525" height="250.00000000000003" fill="#f8f0fc" stroke="#be4bdb" stroke-width="2.5" opacity="1.0" rx="3"/>
  <rect x="92.1859296482412" y="124.42211055276381" width="375.6281407035176" height="231.15577889447238" fill="none" stroke="#ff922b" stroke-width="1.5" opacity="1.0" rx="2"/>
  <rect x="92.1859296482412" y="124.42211055276381" width="375.6281407035176" height="231.15577889447238" fill="none" stroke="#ff6b6b" stroke-width="1" opacity="1.0" rx="2"/>
  <text x="280" y="106.99999999999999" font-size="10" fill="#862e9c" text-anchor="middle" font-weight="bold">Lid: 628 x 398mm</text>
  <text x="280" y="244" font-size="9" fill="#d9480f" text-anchor="middle" font-weight="normal">Cap rim: 598 x 368mm</text>
  <line x1="82.76381909547737" y1="385.0" x2="92.1859296482412" y2="385.0" stroke="#862e9c" stroke-width="1"/>
  <line x1="82.76381909547737" y1="381.0" x2="82.76381909547737" y2="389.0" stroke="#862e9c" stroke-width="1"/>
  <line x1="92.1859296482412" y1="381.0" x2="92.1859296482412" y2="389.0" stroke="#862e9c" stroke-width="1"/>
  <text x="87.47487437185929" y="380.0" font-size="9" fill="#862e9c" text-anchor="middle" font-weight="normal">Overhang 15mm</text>
  <line x1="82.76381909547737" y1="84.99999999999999" x2="477.2361809045226" y2="84.99999999999999" stroke="#555" stroke-width="1"/>
  <line x1="82.76381909547737" y1="80.99999999999999" x2="82.76381909547737" y2="88.99999999999999" stroke="#555" stroke-width="1"/>
  <line x1="477.2361809045226" y1="80.99999999999999" x2="477.2361809045226" y2="88.99999999999999" stroke="#555" stroke-width="1"/>
  <text x="280.0" y="79.99999999999999" font-size="9" fill="#555" text-anchor="middle" font-weight="normal">628mm</text>
  <line x1="57.76381909547737" y1="114.99999999999999" x2="57.76381909547737" y2="365.0" stroke="#555" stroke-width="1"/>
  <line x1="53.76381909547737" y1="114.99999999999999" x2="61.76381909547737" y2="114.99999999999999" stroke="#555" stroke-width="1"/>
  <line x1="53.76381909547737" y1="365.0" x2="61.76381909547737" y2="365.0" stroke="#555" stroke-width="1"/>
  <text x="-2.2361809045226266" y="244.0" font-size="9" fill="#555" text-anchor="start" font-weight="normal">398mm</text>
  <text x="20" y="410" font-size="13" fill="#333" text-anchor="start" font-weight="bold">PROFILE CROSS-SECTION (lid body + skirt + drip edge)</text>
  <rect x="130.0" y="568.5031847133758" width="300.0" height="11.94267515923567" fill="#f8f0fc" stroke="#be4bdb" stroke-width="2.5" opacity="1.0" rx="1"/>
  <rect x="130.0" y="580.4458598726115" width="3.821656050955414" height="9.554140127388536" fill="#f8f0fc" stroke="#be4bdb" stroke-width="2" opacity="1.0" rx="0"/>
  <rect x="426.1783439490446" y="580.4458598726115" width="3.821656050955414" height="9.554140127388536" fill="#f8f0fc" stroke="#be4bdb" stroke-width="2" opacity="1.0" rx="0"/>
  <rect x="137.1656050955414" y="580.4458598726115" width="285.6687898089172" height="3.821656050955414" fill="none" stroke="#ff922b" stroke-width="1.5" opacity="1.0" rx="1"/>
  <text x="280" y="596.267515923567" font-size="9" fill="#d9480f" text-anchor="middle" font-weight="normal">Cap rim (below lid)</text>
  <line x1="445.0" y1="568.5031847133758" x2="445.0" y2="590.0000000000001" stroke="#555" stroke-width="1"/>
  <line x1="441.0" y1="568.5031847133758" x2="449.0" y2="568.5031847133758" stroke="#555" stroke-width="1"/>
  <line x1="441.0" y1="590.0000000000001" x2="449.0" y2="590.0000000000001" stroke="#555" stroke-width="1"/>
  <text x="453.0" y="583.251592356688" font-size="9" fill="#555" text-anchor="start" font-weight="normal">45mm total</text>
  <line x1="105.0" y1="568.5031847133758" x2="105.0" y2="580.4458598726115" stroke="#862e9c" stroke-width="1"/>
  <line x1="101.0" y1="568.5031847133758" x2="109.0" y2="568.5031847133758" stroke="#862e9c" stroke-width="1"/>
  <line x1="101.0" y1="580.4458598726115" x2="109.0" y2="580.4458598726115" stroke="#862e9c" stroke-width="1"/>
  <text x="55.0" y="578.4745222929937" font-size="9" fill="#862e9c" text-anchor="start" font-weight="normal">Body 25mm</text>
  <line x1="105.0" y1="580.4458598726115" x2="105.0" y2="590.0000000000001" stroke="#862e9c" stroke-width="1"/>
  <line x1="101.0" y1="580.4458598726115" x2="109.0" y2="580.4458598726115" stroke="#862e9c" stroke-width="1"/>
  <line x1="101.0" y1="590.0000000000001" x2="109.0" y2="590.0000000000001" stroke="#862e9c" stroke-width="1"/>
  <text x="55.0" y="589.2229299363058" font-size="9" fill="#862e9c" text-anchor="start" font-weight="normal">Skirt 20mm</text>
  <line x1="130.0" y1="610" x2="430.0" y2="610" stroke="#555" stroke-width="1"/>
  <line x1="130.0" y1="606" x2="130.0" y2="614" stroke="#555" stroke-width="1"/>
  <line x1="430.0" y1="606" x2="430.0" y2="614" stroke="#555" stroke-width="1"/>
  <text x="280.0" y="605" font-size="9" fill="#555" text-anchor="middle" font-weight="normal">628mm</text>
  <rect x="580" y="75" width="490" height="640" fill="#f8f0fc" stroke="#be4bdb" stroke-width="1.5" opacity="1.0" rx="6"/>
  <text x="600" y="100" font-size="14" fill="#862e9c" text-anchor="start" font-weight="bold">FUSION 360 WORKFLOW</text>
  <text x="600" y="130" font-size="10" fill="#333" text-anchor="start" font-weight="bold">1. Import DXF profiles</text>
  <text x="600" y="149" font-size="10" fill="#333" text-anchor="start" font-weight="normal">   File &gt; Insert &gt; Insert DXF</text>
  <text x="600" y="168" font-size="10" fill="#333" text-anchor="start" font-weight="normal">   Select 9_lid_top_view.dxf (plan outline + bolts)</text>
  <text x="600" y="187" font-size="10" fill="#333" text-anchor="start" font-weight="normal">   Select 8_cap_profile.dxf (lid cross-section)</text>
  <text x="600" y="206" font-size="10" fill="#999" text-anchor="start" font-weight="normal"></text>
  <text x="600" y="225" font-size="10" fill="#333" text-anchor="start" font-weight="bold">2. Extrude the lid body</text>
  <text x="600" y="244" font-size="10" fill="#333" text-anchor="start" font-weight="normal">   Select the lid outline rectangle</text>
  <text x="600" y="263" font-size="10" fill="#333" text-anchor="start" font-weight="normal">   Extrude &gt; Distance = 25mm (upward)</text>
  <text x="600" y="282" font-size="10" fill="#999" text-anchor="start" font-weight="normal"></text>
  <text x="600" y="301" font-size="10" fill="#333" text-anchor="start" font-weight="bold">3. Extrude the rain skirt</text>
  <text x="600" y="320" font-size="10" fill="#333" text-anchor="start" font-weight="normal">   Select the skirt border region (perimeter ring)</text>
  <text x="600" y="339" font-size="10" fill="#333" text-anchor="start" font-weight="normal">   Extrude &gt; Distance = 20mm (downward from body)</text>
  <text x="600" y="358" font-size="10" fill="#999" text-anchor="start" font-weight="normal"></text>
  <text x="600" y="377" font-size="10" fill="#333" text-anchor="start" font-weight="bold">4. Cut the drip edge groove</text>
  <text x="600" y="396" font-size="10" fill="#333" text-anchor="start" font-weight="normal">   Sketch groove profile on skirt underside</text>
  <text x="600" y="415" font-size="10" fill="#333" text-anchor="start" font-weight="normal">   3mm inset, 3mm deep, 2mm wide channel</text>
  <text x="600" y="434" font-size="10" fill="#333" text-anchor="start" font-weight="normal">   Extrude &gt; Cut around skirt perimeter</text>
  <text x="600" y="453" font-size="10" fill="#999" text-anchor="start" font-weight="normal"></text>
  <text x="600" y="472" font-size="10" fill="#333" text-anchor="start" font-weight="bold">5. Cut bolt through-holes (M4)</text>
  <text x="600" y="491" font-size="10" fill="#333" text-anchor="start" font-weight="normal">   Use bolt pattern from 9_lid_top_view.dxf</text>
  <text x="600" y="510" font-size="10" fill="#333" text-anchor="start" font-weight="normal">   Extrude &gt; Cut &gt; All (through lid body + skirt)</text>
  <text x="600" y="529" font-size="10" fill="#333" text-anchor="start" font-weight="normal">   Bolts thread into 6mm brass heat-set inserts in cap</text>
  <text x="600" y="548" font-size="10" fill="#999" text-anchor="start" font-weight="normal"></text>
  <text x="600" y="567" font-size="10" fill="#333" text-anchor="start" font-weight="bold">6. Add 3mm chamfer on top edges</text>
  <text x="600" y="586" font-size="10" fill="#333" text-anchor="start" font-weight="normal">   Modify &gt; Chamfer on all top perimeter edges</text>
  <text x="600" y="605" font-size="10" fill="#999" text-anchor="start" font-weight="normal"></text>
  <text x="600" y="624" font-size="10" fill="#333" text-anchor="start" font-weight="bold">7. Verify dimensions</text>
  <text x="600" y="643" font-size="10" fill="#333" text-anchor="start" font-weight="normal">   Outer: 628 x 398mm</text>
  <text x="600" y="662" font-size="10" fill="#333" text-anchor="start" font-weight="normal">   Body: 25mm thick</text>
  <text x="600" y="681" font-size="10" fill="#333" text-anchor="start" font-weight="normal">   Skirt: 20mm drop</text>
  <text x="600" y="700" font-size="10" fill="#333" text-anchor="start" font-weight="normal">   Overhang: 15mm past cap rim</text>
  <text x="600" y="719" font-size="10" fill="#999" text-anchor="start" font-weight="normal"></text>
  <text x="600" y="738" font-size="10" fill="#333" text-anchor="start" font-weight="bold">8. Print settings</text>
  <text x="600" y="757" font-size="10" fill="#333" text-anchor="start" font-weight="normal">   Material: ASA (UV-stable)</text>
  <text x="600" y="776" font-size="10" fill="#333" text-anchor="start" font-weight="normal">   Infill: 20% (trapped air = insulation)</text>
  <text x="600" y="795" font-size="10" fill="#333" text-anchor="start" font-weight="normal">   No foam behind lid — infill IS the insulation</text>
  <rect x="580" y="725" width="490" height="30" fill="#be4bdb" stroke="#862e9c" stroke-width="1" opacity="1.0" rx="4"/>
  <text x="825" y="745" font-size="12" fill="white" text-anchor="middle" font-weight="bold">Material: ASA  |  Body: 25mm  |  Skirt: 20mm  |  20% infill</text>
</svg>
